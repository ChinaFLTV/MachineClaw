[target.x86_64-unknown-linux-musl]
linker = "scripts/zigcc-x86_64-unknown-linux-musl.sh"
rustflags = ["-Clink-self-contained=no"]

[target.aarch64-unknown-linux-musl]
linker = "scripts/zigcc-aarch64-unknown-linux-musl.sh"
rustflags = ["-Clink-self-contained=no"]

[env]
ZIG_LOCAL_CACHE_DIR = { value = ".zig-cache", relative = true }
ZIG_GLOBAL_CACHE_DIR = { value = ".zig-global-cache", relative = true }
CC_x86_64_unknown_linux_musl = { value = "scripts/zigcc-x86_64-unknown-linux-musl.sh", relative = true }
"CC_x86_64-unknown-linux-musl" = { value = "scripts/zigcc-x86_64-unknown-linux-musl.sh", relative = true }
AR_x86_64_unknown_linux_musl = { value = "scripts/zig-ar.sh", relative = true }
"AR_x86_64-unknown-linux-musl" = { value = "scripts/zig-ar.sh", relative = true }
CC_aarch64_unknown_linux_musl = { value = "scripts/zigcc-aarch64-unknown-linux-musl.sh", relative = true }
"CC_aarch64-unknown-linux-musl" = { value = "scripts/zigcc-aarch64-unknown-linux-musl.sh", relative = true }
AR_aarch64_unknown_linux_musl = { value = "scripts/zig-ar.sh", relative = true }
"AR_aarch64-unknown-linux-musl" = { value = "scripts/zig-ar.sh", relative = true }
